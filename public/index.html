<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页 - 2025师大牧养表单</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/index.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <!-- 导航栏容器 -->
  <div id="navbar-container"></div>

  <!-- 首页内容容器 -->
  <div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
    <h1 class="text-center mb-4">2025师大牧养表单</h1>
    <div class="d-grid gap-2 col-6 mx-auto">
      <button class="btn btn-primary" onclick="window.location.href='hall3.html'">3会所</button>
      <button class="btn btn-primary" onclick="window.location.href='hall62.html'">62会所</button>
      <button class="btn btn-primary" onclick="window.location.href='hall71.html'">71会所</button>
      <button class="btn btn-primary" onclick="window.location.href='hall82.html'">82会所</button>
      <button class="btn btn-primary" onclick="window.location.href='hall103.html'">103会所</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
  <script>
    // 动态加载navbar.html
    function loadNavbar() {
      fetch('navbar.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('navbar-container').innerHTML = data;
          
          // 判断当前页面路径是否为index.html
          const currentPage = window.location.pathname;
          if (currentPage === '/index.html' || currentPage === '/') {
            // 如果是首页，隐藏日期选择器
            const dateRangeContainer = document.getElementById('date-range-container');
            if (dateRangeContainer) {
              dateRangeContainer.style.display = 'none';
            }
          }
        })
        .catch(error => console.error('Error loading navbar:', error));
    }

    // 初始化时加载navbar
    loadNavbar();
  </script>
</body>
</html>
